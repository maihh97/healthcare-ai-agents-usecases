<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fae8ff"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fda4af" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Antenna -->
  <line x1="64" y1="32" x2="64" y2="22" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="18" r="6" fill="url(#sparkGlow)"/>
  <circle cx="62" cy="16" r="1.5" fill="#fff" opacity="0.9"/>

  <!-- Body: big rounded blob -->
  <rect x="24" y="32" width="80" height="76" rx="34" ry="34"
        fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Side ear nubs -->
  <ellipse cx="22" cy="68" rx="6" ry="9" fill="#a78bfa"/>
  <ellipse cx="106" cy="68" rx="6" ry="9" fill="#a78bfa"/>
  <circle cx="22" cy="68" r="2.5" fill="#fbbf24"/>
  <circle cx="106" cy="68" r="2.5" fill="#fbbf24"/>

  <!-- Face screen: soft rounded square -->
  <rect x="36" y="44" width="56" height="44" rx="18" ry="18" fill="url(#bellyGrad)"/>

  <!-- Cheeks (blushy) -->
  <circle cx="46" cy="74" r="6" fill="url(#cheek)"/>
  <circle cx="82" cy="74" r="6" fill="url(#cheek)"/>

  <!-- Big sparkly eyes -->
  <g>
    <ellipse cx="54" cy="64" rx="6" ry="7.5" fill="#1e1b4b"/>
    <circle cx="56" cy="61" r="2.2" fill="#fff"/>
    <circle cx="52.5" cy="66.5" r="1" fill="#fff"/>
  </g>
  <g>
    <ellipse cx="74" cy="64" rx="6" ry="7.5" fill="#1e1b4b"/>
    <circle cx="76" cy="61" r="2.2" fill="#fff"/>
    <circle cx="72.5" cy="66.5" r="1" fill="#fff"/>
  </g>

  <!-- Tiny smile -->
  <path d="M 58 78 Q 64 83 70 78" stroke="#9d174d" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Floating sparkles around -->
  <g fill="#fde68a" opacity="0.95">
    <path d="M 16 38 L 17.5 41 L 20.5 42 L 17.5 43 L 16 46 L 14.5 43 L 11.5 42 L 14.5 41 Z"/>
    <path d="M 112 44 L 113 46 L 115 47 L 113 48 L 112 50 L 111 48 L 109 47 L 111 46 Z"/>
    <path d="M 108 96 L 109 98 L 111 99 L 109 100 L 108 102 L 107 100 L 105 99 L 107 98 Z"/>
  </g>
</svg>
